services:
  - type: web
    name: manga-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: USER_ID
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_NAME
        value: manga_bot
      - key: STORAGE_CHANNEL_ID
        sync: false
      - key: CHECK_INTERVAL
        value: "300"
      - key: MAX_CHAPTERS
        value: "5"
